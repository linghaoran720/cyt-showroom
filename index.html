<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财运通产品功能体验馆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1d33 50%, #0a1628 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Header */
        .header {
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 64px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00c853 0%, #00a344 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-tab {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-tab:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .nav-tab.active {
            background: rgba(0, 200, 83, 0.15);
            color: #00c853;
            border-color: rgba(0, 200, 83, 0.3);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 240px;
            padding: 10px 16px 10px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: rgba(0, 200, 83, 0.4);
            background: rgba(255,255,255,0.08);
            width: 300px;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid rgba(0, 200, 83, 0.3);
            border-radius: 16px;
            font-size: 0.75rem;
            color: #00c853;
        }

        /* Main Content */
        .main-content {
            padding-top: 64px;
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 40px 40px;
            background: radial-gradient(ellipse at center top, rgba(0,200,83,0.08) 0%, transparent 60%);
        }

        .hero-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            max-width: 500px;
            margin: 0 auto;
        }

        /* Filter Tags */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px 40px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tag:hover, .filter-tag.active {
            background: rgba(0, 200, 83, 0.15);
            border-color: rgba(0, 200, 83, 0.4);
            color: #00c853;
        }

        /* Module Sections */
        .modules-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        .module-section {
            margin-bottom: 50px;
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .module-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(0,200,83,0.2) 0%, rgba(0,163,68,0.15) 100%);
            border: 1px solid rgba(0,200,83,0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .module-title-group {
            flex: 1;
        }

        .module-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .module-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        .module-count {
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        /* Feature Cards Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .feature-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,200,83,0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feature-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(0, 200, 83, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), 0 0 20px rgba(0,200,83,0.05);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(0,200,83,0.1);
            border-radius: 12px;
            font-size: 0.7rem;
            color: #00c853;
            margin-bottom: 12px;
        }

        .feature-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #00c853;
            border-radius: 50%;
        }

        .feature-title {
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .feature-path {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }

        .feature-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .feature-date {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }

        .feature-arrow {
            width: 28px;
            height: 28px;
            background: rgba(0,200,83,0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00c853;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .feature-card:hover .feature-arrow {
            background: #00c853;
            color: #fff;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 0 20px;
            }

            .nav-tabs {
                display: none;
            }

            .search-box input {
                width: 160px;
            }

            .search-box input:focus {
                width: 180px;
            }

            .hero {
                padding: 40px 20px 30px;
            }

            .hero-title {
                font-size: 1.6rem;
            }

            .modules-container {
                padding: 20px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Fade Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .module-section {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">C</div>
                <div class="logo-text">财运通产品功能体验馆</div>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索功能...">
                </div>
                <div class="tag">面向物流企业和货主</div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="hero">
            <h1 class="hero-title">系统演示</h1>
            <p class="hero-subtitle">产品功能体验和能力范围，点击卡片查看交互原型</p>
        </section>

        <div class="filter-bar">
            <div class="filter-tag active" data-filter="all">全部功能</div>
            <div class="filter-tag" data-filter="报表中心">报表中心</div>
            <div class="filter-tag" data-filter="车务中心">车务中心</div>
            <div class="filter-tag" data-filter="智能识别">智能识别</div>
            <div class="filter-tag" data-filter="轮胎管理">轮胎管理</div>
        </div>

        <div class="modules-container" id="modulesContainer">
            <!-- 模块内容将由JavaScript动态生成 -->
        </div>
    </main>

    <script>
        // 功能数据
        const modules = [
            {
                id: "报表中心",
                name: "报表中心",
                icon: "📊",
                desc: "车辆运营报表、油耗分析、数据导出",
                features: [
                    { title: "油耗数据确认与变更", path: "报表中心/油耗分析-**满到满导出汇总明细/index.html", date: "2026-04-12" },
                    { title: "油耗分析-满到满导出", path: "报表中心/油耗分析-**满到满导出汇总明细/index.html", date: "2026-04-12" }
                ]
            },
            {
                id: "车务中心",
                name: "车务中心",
                icon: "🔧",
                desc: "物料管理、维修保养、ETC、油卡充值",
                features: [
                    { title: "物料盘点", path: "车务中心/07物料管理/prototypes/物料盘点/index.html", date: "2026-03-27" },
                    { title: "物料入库-补录单价", path: "车务中心/07物料管理/03物料入库/2604物料入库支持结算后补录单价/2604-物料入库支持结算后补录单价-PT/index.html", date: "2026-03-26" }
                ]
            },
            {
                id: "智能识别",
                name: "智能识别系统",
                icon: "🤖",
                desc: "AI智能识别、录单辅助、数据映射",
                features: [
                    { title: "智能录单·双端同链演示", path: "智能识别系统/智能识别-录单/PT/index.html", date: "2026-04-13" }
                ]
            },
            {
                id: "轮胎管理",
                name: "轮胎管理",
                icon: "🛣️",
                desc: "轮胎存管、使用跟踪、成本分析",
                features: [
                    { title: "轮胎管理系统", path: "轮胎管理/Cursor-html/index.html", date: "2026-03-31" }
                ]
            }
        ];

        // 渲染模块
        function renderModules(filter = 'all', searchTerm = '') {
            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';

            let hasResult = false;

            modules.forEach(module => {
                if (filter !== 'all' && module.id !== filter) return;

                const filteredFeatures = module.features.filter(f => {
                    if (!searchTerm) return true;
                    return f.title.toLowerCase().includes(searchTerm.toLowerCase());
                });

                if (filteredFeatures.length === 0 && searchTerm) return;

                hasResult = true;

                const section = document.createElement('div');
                section.className = 'module-section';
                section.innerHTML = `
                    <div class="module-header">
                        <div class="module-icon">${module.icon}</div>
                        <div class="module-title-group">
                            <div class="module-title">${module.name}</div>
                            <div class="module-desc">${module.desc}</div>
                        </div>
                        <div class="module-count">${filteredFeatures.length} 个功能</div>
                    </div>
                    <div class="feature-grid">
                        ${filteredFeatures.map(feature => `
                            <div class="feature-card" onclick="openFeature('${feature.path}')">
                                <div class="feature-status">已上线</div>
                                <div class="feature-title">${feature.title}</div>
                                <div class="feature-path">${module.name} / ${feature.title}</div>
                                <div class="feature-meta">
                                    <div class="feature-date">${feature.date}</div>
                                    <div class="feature-arrow">→</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });

            if (!hasResult) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div>未找到匹配的功能</div>
                    </div>
                `;
            }
        }

        // 打开功能原型
        function openFeature(path) {
            if (path === '#') {
                alert('该功能原型暂未上线，敬请期待');
                return;
            }
            // 直接打开路径
            window.open(path, '_blank');
        }

        // 筛选标签点击
        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                renderModules(tag.dataset.filter, document.getElementById('searchInput').value);
            });
        });

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const activeFilter = document.querySelector('.filter-tag.active');
            renderModules(activeFilter.dataset.filter, e.target.value);
        });

        // 初始化渲染
        renderModules();
    </script>
</body>
</html>
